short_bio: >-
  I am a final-year CSE Ph.D. candidate in <a href="http://ariselab.cse.cuhk.edu.hk/">ARISE Lab</a> at The Chinese University of Hong Kong, supervised by <a href="https://www.cse.cuhk.edu.hk/lyu/">Prof. Michael R. Lyu</a>.
  Previously, I obtained my Bachelor's degree from Sun Yat-sen University, in 2022.
  <br>
  My research is dedicated to <b>enhancing the observability and reliability of large-scale cloud and LLM systems</b>, with a particular focus on AIOps for LLM systems (Ops4LLM) and LLM-enhanced AIOps (LLM4Ops).
  My recent work centers on developing <b>reliable agentic systems</b> and advancing <b>agent-driven DevOps</b>.
  <br>
  <em>I am always open to academic discussions and brainstorming. Feel free to drop me an email if you are interested to connect.</em>

