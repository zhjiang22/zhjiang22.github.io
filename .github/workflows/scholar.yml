name: Update Google Scholar Stats

on:
  schedule:
    # Run once per day and avoid the top-of-hour Actions queue spike.
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch Google Scholar stats
        env:
          SCHOLAR_ID: "6F85yPcAAAAJ"
          ALLOW_STALE_ON_FAILURE: "1"
          SCHOLAR_FETCH_ATTEMPTS: "5"
          SCHOLAR_FETCH_RETRY_DELAY: "8"
        run: python scripts/fetch_scholar.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/scholar.yml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update Google Scholar stats"
          git push
